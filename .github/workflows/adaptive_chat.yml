# Runs the Adaptive Chat demo tests: the Flutter client (adaptive_chat_client)
# and the Python FastAPI backend (adaptive_chat_server). These live outside the
# published packages, so they are kept in their own workflow rather than the
# package matrix in test.yml.
#
# Scoped `push` to main to avoid duplicate runs on branches with an open PR
# (matches test.yml / validate.yaml).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  client:
    name: Adaptive Chat client (Flutter)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: 3.44.0 # should sync with fvm version (.fvmrc)
          cache: true

      - run: dart --version
      - run: flutter --version

      # Resolve from the repo root: adaptive_chat_client is a workspace member,
      # so its dependencies are resolved by the root pub get (Flutter 3.6.0+
      # workspace feature), same as the package tests in test.yml.
      - run: flutter pub get

      - name: Run adaptive_chat_client tests
        run: flutter test -r expanded
        working-directory: ./adaptive_chat_client

  server:
    name: Adaptive Chat server (Python)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: adaptive_chat_server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./adaptive_chat_server

      # conftest.py at the package root puts adaptive_chat_server on sys.path so
      # `import app.*` resolves when pytest runs from here.
      - name: Run adaptive_chat_server tests
        run: python -m pytest
        working-directory: ./adaptive_chat_server
