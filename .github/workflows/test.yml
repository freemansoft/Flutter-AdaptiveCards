# Build on pushes to main (merges) and on pull requests. Scoping `push` to main
# avoids the duplicate run you'd get from `on: [push, pull_request]` when pushing
# to a branch that has an open PR (both events fire). Feature-branch commits are
# covered by the `pull_request` event once a PR is open.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-24.04]
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable" # Or 'beta' or 'master' depending on your needs
          flutter-version: 3.44.0 # should sync with fvm version
          cache: true

      # this relies on the new flutter 3.6.0 workspace feature
      - run: dart --version
      - run: flutter --version
      - run: flutter pub get

      # Golden render validation. Golden tests are tagged 'golden'; this pass runs
      # ONLY them (--tags=golden) and the coverage passes below run ONLY non-golden
      # tests, so every test runs exactly once. Only adaptive_cards and
      # adaptive_charts have golden tests.
      - name: Run adaptive_cards golden tests
        run: flutter test -r expanded --tags=golden
        working-directory: ./packages/flutter_adaptive_cards_fs

      - name: Upload adaptive_cards golden test failure images
        if: ${{ failure() }} # This ensures the step runs only if the previous test step failed
        uses: actions/upload-artifact@v7
        with:
          name: adaptive_cards_golden_test_failures # Name for the artifact
          path: packages/flutter_adaptive_cards_fs/test/failures # The path where Flutter saves failure images
          retention-days: 7 # Optional: how long to keep the artifact

      - name: Run adaptive_charts golden tests
        run: flutter test -r expanded --tags=golden
        working-directory: ./packages/flutter_adaptive_charts_fs

      - name: Upload adaptive_charts golden test failure images
        if: ${{ failure() }} # This ensures the step runs only if the previous test step failed
        uses: actions/upload-artifact@v7
        with:
          name: adaptive_charts_golden_test_failures # Name for the artifact
          path: packages/flutter_adaptive_charts_fs/test/failures # The path where Flutter saves failure images
          retention-days: 7 # Optional: how long to keep the artifact

      - name: Run adaptive_explorer tests
        run: flutter test -r expanded
        working-directory: ./adaptive_explorer

      # Coverage passes (non-golden, with coverage). --exclude-tags=golden means the
      # measured number matches local `fvm flutter test --coverage
      # --exclude-tags=golden`, so CI and local never diverge. adaptive_cards_host and
      # adaptive_templating have no golden tests, so this is also their full test run.
      # Together with the golden passes above, every test runs exactly once.
      - name: Coverage pass - adaptive_cards
        run: flutter test -r failures-only --coverage --exclude-tags=golden
        working-directory: ./packages/flutter_adaptive_cards_fs

      - name: Coverage pass - adaptive_charts
        run: flutter test -r failures-only --coverage --exclude-tags=golden
        working-directory: ./packages/flutter_adaptive_charts_fs

      - name: Coverage pass - adaptive_cards_host
        run: flutter test -r failures-only --coverage --exclude-tags=golden
        working-directory: ./packages/flutter_adaptive_cards_host_fs

      - name: Coverage pass - adaptive_templating
        run: flutter test -r failures-only --coverage --exclude-tags=golden
        working-directory: ./packages/flutter_adaptive_template_fs

      # Ratchet coverage gate. Compares each package's coverage/lcov.info against
      # the floor in tool/coverage_floors.yaml. Floors are golden-excluded numbers,
      # identical to local measurement, so the gate is deterministic. Currently
      # --report-only (prints the table, never fails the build) to validate the CI
      # plumbing; drop --report-only to make it enforcing. See docs/testing-coverage.md.
      - name: Coverage gate (report-only)
        run: dart run tool/coverage/check_coverage.dart
